name: deploy

# Auto-deploys lingo-core Lambda code on every push to main.
# Auth: GitHub OIDC -> ci-lingo-core IAM role (no stored AWS keys). The role
# can only update/invoke the lingo-core / lingo-test functions.
# Function name defaults to "lingo-test"; override via repo variable
# LINGO_CORE_FUNCTION_NAME if your Lambda is named differently.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required to mint the OIDC token
  contents: read

env:
  # Default 'lingo-test' matches the current manually-provisioned function.
  # Will switch to 'lingo-core' when we cut over to the greenfield AWS
  # account + Terraform-managed Lambda. Override via repo variable
  # LINGO_CORE_FUNCTION_NAME if you don't want to edit the workflow.
  FUNCTION_NAME: ${{ vars.LINGO_CORE_FUNCTION_NAME || 'lingo-test' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: build zip
        run: ./scripts/build-zip.sh
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::349654078389:role/ci-lingo-core
          aws-region: us-west-1
      - name: update lambda code
        # --query limits output to safe fields; the default output dumps the
        # full function config INCLUDING environment variables into the log.
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://lingo-core.zip \
            --publish \
            --query '{Version: Version, CodeSha256: CodeSha256, LastModified: LastModified}'
      - name: write smoke-test payload
        run: |
          # Full API Gateway v2 shape — Mangum requires requestContext.http.sourceIp
          # (and friends); a minimal payload crashes with KeyError 'sourceIp'.
          printf '%s' '{"version":"2.0","routeKey":"$default","rawPath":"/health","rawQueryString":"","headers":{"host":"smoke.test"},"requestContext":{"accountId":"0","apiId":"smoke","domainName":"smoke.test","http":{"method":"GET","path":"/health","protocol":"HTTP/1.1","sourceIp":"127.0.0.1","userAgent":"smoke-test"},"requestId":"smoke","routeKey":"$default","stage":"$default","time":"01/Jan/2026:00:00:00 +0000","timeEpoch":0},"isBase64Encoded":false}' > /tmp/payload.json
      - name: wait + smoke test
        # --cli-binary-format raw-in-base64-out is REQUIRED with AWS CLI v2:
        # without it the CLI treats the payload as base64, and Lambda ends up
        # parsing base64-decoded garbage. (This was the real cause of the
        # historical "soft hyphen U+00AD" smoke-test failures — 0xAD is just a
        # byte that falls out of base64-decoding raw JSON.)
        run: |
          aws lambda wait function-updated --function-name "$FUNCTION_NAME"
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --payload file:///tmp/payload.json \
            --cli-binary-format raw-in-base64-out \
            /tmp/out.json
          cat /tmp/out.json
          python3 -c "import json,sys; r=json.load(open('/tmp/out.json')); sys.exit(0 if int(r.get('statusCode',500)) < 400 else 1)"
