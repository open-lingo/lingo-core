name: deploy

# Auto-deploys lingo-core Lambda code on every push to main.
# Auth: GitHub OIDC -> ci-lingo-core IAM role (no stored AWS keys). The role
# can only update/invoke the lingo-core / lingo-test functions.
# Function name defaults to "lingo-test"; override via repo variable
# LINGO_CORE_FUNCTION_NAME if your Lambda is named differently.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required to mint the OIDC token
  contents: read

env:
  # Default 'lingo-test' matches the current manually-provisioned function.
  # Will switch to 'lingo-core' when we cut over to the greenfield AWS
  # account + Terraform-managed Lambda. Override via repo variable
  # LINGO_CORE_FUNCTION_NAME if you don't want to edit the workflow.
  FUNCTION_NAME: ${{ vars.LINGO_CORE_FUNCTION_NAME || 'lingo-test' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: build zip
        run: ./scripts/build-zip.sh
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::349654078389:role/ci-lingo-core
          aws-region: us-west-1
      - name: update lambda code
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://lingo-core.zip \
            --publish
      - name: write smoke-test payload
        # printf with single-quoted JSON, then an ASCII assertion — immune to
        # the invisible-unicode (U+00AD soft hyphen) issue that broke the
        # previous heredoc/inline payloads.
        run: |
          printf '%s' '{"rawPath":"/health","requestContext":{"http":{"method":"GET","path":"/health"}},"headers":{},"version":"2.0"}' > /tmp/payload.json
          python3 -c "open('/tmp/payload.json', encoding='ascii').read()"
      - name: wait + smoke test
        run: |
          aws lambda wait function-updated --function-name "$FUNCTION_NAME"
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --payload file:///tmp/payload.json \
            /tmp/out.json
          cat /tmp/out.json
          python3 -c "import json,sys; r=json.load(open('/tmp/out.json')); sys.exit(0 if int(r.get('statusCode',500)) < 400 else 1)"
